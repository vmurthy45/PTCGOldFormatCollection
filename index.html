<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EE2B39">
<title>Vig's Pokémon Old Format Collection</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CclipPath id='t'%3E%3Cpath d='M4 50A46 46 0 0 1 96 50Z'/%3E%3C/clipPath%3E%3CclipPath id='b'%3E%3Cpath d='M4 50A46 46 0 0 0 96 50Z'/%3E%3C/clipPath%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='%23fff' stroke='%2339424B' stroke-width='6'/%3E%3Cpath d='M4 50A46 46 0 0 1 96 50Z' fill='%23F0504A'/%3E%3Cg clip-path='url(%23t)'%3E%3Cellipse cx='80' cy='22' rx='28' ry='32' fill='%23D8413C'/%3E%3C/g%3E%3Cg clip-path='url(%23b)'%3E%3Cellipse cx='80' cy='78' rx='30' ry='26' fill='%23E4E6E9'/%3E%3C/g%3E%3Crect x='4' y='44' width='92' height='12' fill='%2339424B'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23fff'/%3E%3Ccircle cx='50' cy='50' r='13' fill='%2339424B'/%3E%3Ccircle cx='50' cy='50' r='8' fill='%23fff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#EE2B39; --red-dark:#C81E2B; --charcoal:#3B4048; --charcoal-dark:#2B2F35;
    --ink:#2b2f35; --muted:#7a828d; --line:#e2c9cc; --bg:#f5f2f2; --card:#ffffff;
    --band-a:#fdeced; --band-b:#f8f5f5; --cnt-bg:#fbd9dc; --steel:#5a6470;
    --mark-bg:#ffe58a; --mark-ink:#2b2f35; --overlay:rgba(20,18,19,.6);
    --pokeball-ink:#202225; --shadow:rgba(59,64,72,.14);
  }
  :root[data-theme="dark"]{
    /* Only the background/surface colors change for dark mode - the red
       accent and pokeball icon stay pinned to the same values as light mode.
       --charcoal/--charcoal-dark are the exception: they're real text colors
       used inside guide content (headings, bold text) on the card background,
       so they still need to flip light-on-dark or that text becomes
       unreadable. */
    --charcoal:#c7cbd1; --charcoal-dark:#f1f1f3;
    --ink:#e8e8ea; --muted:#9099a3; --line:#33383f; --bg:#131417; --card:#1c1f24;
    --band-a:#2a1c1e; --band-b:#20232a; --cnt-bg:#3a2226; --steel:#9099a3;
    --overlay:rgba(0,0,0,.75); --shadow:rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    position:sticky; top:0; z-index:20;
    background:var(--red);
    color:#fff; padding:0; box-shadow:0 4px 16px var(--shadow);
  }
  .head-inner{
    max-width:820px; margin:0 auto; display:flex; align-items:center; gap:14px;
    padding:15px 18px; padding-top:calc(15px + env(safe-area-inset-top));
  }
  header svg{width:42px; height:42px; flex:0 0 auto; filter:drop-shadow(0 2px 4px rgba(0,0,0,.35))}
  header h1{
    font-family:'Poppins',sans-serif; font-size:19px; margin:0; font-weight:700;
    letter-spacing:.2px; line-height:1.2;
  }
  header .sub{font-size:12.5px; opacity:.88; margin-top:2px; font-weight:500; letter-spacing:.1px}
  .theme-toggle{
    margin-left:auto; flex:0 0 auto; width:40px; height:40px; border-radius:50%;
    border:1px solid rgba(255,255,255,.4); background:rgba(255,255,255,.14); color:#fff;
    font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.15); transition:background .15s,transform .15s;
  }
  .theme-toggle:hover{background:rgba(255,255,255,.24); transform:translateY(-1px)}
  /* thin charcoal accent line under header, echoing pokeball seam */
  .seam{height:4px; background:var(--pokeball-ink); box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}
  .wrap{max-width:820px; margin:0 auto; padding:16px 12px 40px}
  .controls{display:flex; flex-direction:column; gap:10px; margin-bottom:12px}
  .search{
    width:100%; padding:13px 16px; font-size:16px; border:1px solid var(--line);
    border-radius:13px; background:var(--card); color:var(--ink); outline:none;
    box-shadow:0 1px 2px var(--shadow); transition:box-shadow .15s,border-color .15s;
  }
  .search::placeholder{color:var(--muted)}
  .search:focus{border-color:var(--red); box-shadow:0 0 0 3px rgba(238,43,57,.15)}
  .filters{display:flex; flex-wrap:wrap; gap:8px}
  .chip{
    padding:7px 14px; border-radius:999px; border:1px solid var(--line);
    background:var(--card); color:var(--red-dark); font-size:13px; font-weight:600; cursor:pointer;
    white-space:nowrap; user-select:none; transition:background .15s,color .15s,border-color .15s,transform .15s,box-shadow .15s;
    box-shadow:0 1px 2px var(--shadow);
  }
  .chip:hover{border-color:var(--red); transform:translateY(-1px)}
  .chip.active{background:var(--red); color:#fff; border-color:var(--red); box-shadow:0 3px 10px rgba(238,43,57,.35)}
  .stats{font-size:13px; color:var(--muted); margin:2px 2px 14px; font-weight:500}
  .turn1-box{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    margin-bottom:16px; overflow:hidden; box-shadow:0 2px 10px var(--shadow);
  }
  .turn1-box[hidden]{display:none}
  .t1-toggle{
    width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:13px 16px; cursor:pointer; color:#fff; background:var(--pokeball-ink); border:none;
    font-family:'Poppins',sans-serif; font-size:14.5px; font-weight:600; text-align:left;
  }
  .t1-toggle:hover{filter:brightness(1.2)}
  .t1-arrow{transition:transform .2s; font-size:12px}
  .t1-toggle.active .t1-arrow{transform:rotate(90deg)}
  .t1-panel{display:none; padding:16px}
  .t1-panel.open{display:block}
  .t1-flip{font-size:14px; margin-bottom:10px}
  .t1-flip strong{font-family:'Poppins',sans-serif}
  .t1-sub{font-size:11px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-bottom:8px}
  .t1-rule{font-size:14px; padding:6px 0; display:flex; align-items:center; gap:8px}
  .deck{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    margin-bottom:16px; overflow:hidden; box-shadow:0 2px 10px var(--shadow);
    transition:box-shadow .2s,transform .2s;
  }
  .deck:hover{box-shadow:0 6px 20px var(--shadow); transform:translateY(-1px)}
  .deck-head{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px; cursor:pointer; color:#fff;
    background:var(--red);
    border-bottom:3px solid var(--pokeball-ink);
  }
  .deck-head .title{font-family:'Poppins',sans-serif; font-weight:600; font-size:15.5px; letter-spacing:.1px}
  .deck-head .meta{font-size:12px; opacity:.9; font-weight:500; display:flex; align-items:center; gap:8px}
  .deck-head .arrow{transition:transform .2s; font-size:12px; opacity:.95}
  .deck.collapsed .arrow{transform:rotate(-90deg)}
  .deck.collapsed .cards{display:none}
  .deck.collapsed .guidebar{display:none}
  .deck.collapsed .guide-panel{display:none}
  .deck.collapsed .deck-head{border-bottom:none}
  .deck.guide-open .cards{display:none}
  .cards{padding:4px 0}
  .section-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px 5px; font-size:11px; font-weight:700; letter-spacing:.8px;
    text-transform:uppercase; color:var(--muted);
  }
  .section-total{
    background:var(--band-b); color:var(--muted); font-weight:700; font-size:11px;
    padding:2px 9px; border-radius:999px;
  }
  .row{
    display:grid; grid-template-columns:34px 1fr auto; gap:8px; align-items:center;
    padding:10px 16px; border-top:1px solid var(--band-b); font-size:14px; cursor:pointer;
    transition:background .12s;
  }
  .row:hover{background:var(--band-a)}
  .row:first-child{border-top:none}
  .row .cnt{
    background:var(--cnt-bg); color:var(--red-dark); font-weight:700; text-align:center;
    border-radius:7px; padding:3px 0; font-size:13px;
  }
  .row .nm{font-weight:500}
  .row .st{color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; text-align:right}
  mark{background:var(--mark-bg); color:var(--mark-ink); border-radius:3px; padding:0 1px}
  .empty{text-align:center; color:var(--muted); padding:40px 20px; font-size:15px}
  /* guide expander */
  .guidebar{border-top:1px solid var(--band-b); background:var(--band-a)}
  .guide-btn{
    width:100%; text-align:left; border:none; background:transparent; cursor:pointer;
    padding:12px 16px; font-size:13px; font-weight:700; color:var(--red-dark);
    font-family:inherit; letter-spacing:.1px; transition:background .12s;
  }
  .guide-btn:hover{background:var(--cnt-bg)}
  .guide-btn.active{background:var(--cnt-bg)}
  .guide-panel{display:none; padding:2px 20px 20px; font-size:13.5px; line-height:1.6; color:var(--ink)}
  .guide-panel.open{display:block; border-top:1px solid var(--band-b)}
  .guide-panel h1{font-family:'Poppins',sans-serif; font-size:17px; margin:16px 0 5px; color:var(--red-dark); font-weight:700}
  .guide-panel h2{font-family:'Poppins',sans-serif; font-size:14px; margin:18px 0 5px; color:var(--charcoal); border-bottom:1px solid var(--line); padding-bottom:4px; font-weight:600}
  .guide-panel p{margin:6px 0}
  .guide-panel ul,.guide-panel ol{margin:6px 0; padding-left:20px}
  .guide-panel li{margin:3px 0}
  .guide-panel code{background:var(--card); border:1px solid var(--line); border-radius:4px; padding:0 3px; font-size:12px}
  .guide-panel em{color:var(--muted)}
  .guide-panel blockquote{margin:8px 0; padding:6px 12px; border-left:3px solid var(--red); background:var(--card); color:var(--charcoal)}
  .guide-panel hr{border:none; border-top:1px solid var(--line); margin:12px 0}
  .guide-panel strong{color:var(--charcoal-dark)}
  .count-badge{background:rgba(255,255,255,.24); padding:2px 8px; border-radius:999px; font-size:11px}
  .loading{text-align:center; color:var(--muted); padding:40px 20px; font-size:15px}
  /* card image modal */
  .modal-overlay{
    position:fixed; inset:0; background:var(--overlay); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .modal-overlay[hidden]{display:none}
  .modal-box{
    position:relative; max-width:480px; width:100%; background:var(--card);
    border-radius:18px; padding:20px; text-align:center; box-shadow:0 24px 70px rgba(0,0,0,.45);
  }
  @media (min-width:640px){
    .modal-box{max-width:560px; padding:24px}
  }
  .modal-close{
    position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:50%;
    border:none; background:var(--band-b); color:var(--ink); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:1;
    box-shadow:0 1px 3px var(--shadow);
  }
  .modal-body img{max-width:100%; width:100%; height:auto; border-radius:12px; display:block; margin:0 auto; box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .modal-noimg{padding:60px 10px; color:var(--muted); font-size:14px}
  .modal-caption{margin-top:14px; font-size:13.5px; color:var(--muted); font-weight:600}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <svg viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <clipPath id="pbTop"><path d="M4 50A46 46 0 0 1 96 50Z"/></clipPath>
        <clipPath id="pbBottom"><path d="M4 50A46 46 0 0 0 96 50Z"/></clipPath>
      </defs>
      <circle cx="50" cy="50" r="46" fill="#fff" stroke="#39424B" stroke-width="6"/>
      <path d="M4 50A46 46 0 0 1 96 50Z" fill="#F0504A"/>
      <g clip-path="url(#pbTop)"><ellipse cx="80" cy="22" rx="28" ry="32" fill="#D8413C"/></g>
      <g clip-path="url(#pbBottom)"><ellipse cx="80" cy="78" rx="30" ry="26" fill="#E4E6E9"/></g>
      <rect x="4" y="44" width="92" height="12" fill="#39424B"/>
      <circle cx="50" cy="50" r="15" fill="#fff"/>
      <circle cx="50" cy="50" r="13" fill="#39424B"/>
      <circle cx="50" cy="50" r="8" fill="#fff"/>
    </svg>
    <div>
      <h1>Vig's Pokémon Old Format Collection</h1>
      <div class="sub">Competitive decks 2010–2025</div>
    </div>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
  </div>
</header>
<div class="seam"></div>

<div class="wrap">
  <div class="controls">
    <input id="q" class="search" type="search" placeholder="Search cards, decks, sets…" autocomplete="off">
    <div id="years" class="filters"></div>
  </div>
  <div id="stats" class="stats"></div>
  <div id="turn1Box" class="turn1-box" hidden></div>
  <div id="list"><div class="loading">Loading collection…</div></div>
</div>

<div id="imgModal" class="modal-overlay" hidden>
  <div class="modal-box">
    <button class="modal-close" type="button" aria-label="Close">&times;</button>
    <div class="modal-body"></div>
  </div>
</div>

<script>
/* ---------- theme ---------- */
const themeBtn = document.getElementById('themeToggle');
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
}
(function initTheme(){
  const saved = localStorage.getItem('theme');
  const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved || (systemDark ? 'dark' : 'light'));
})();
themeBtn.onclick = () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
};

/* ---------- card image modal ---------- */
const modal = document.getElementById('imgModal');
const modalBody = modal.querySelector('.modal-body');
function openCardModal(card){
  modalBody.innerHTML = '';
  if(card.image){
    const img = document.createElement('img');
    img.src = card.image;
    img.alt = card.name;
    modalBody.appendChild(img);
  } else {
    const p = document.createElement('div');
    p.className = 'modal-noimg';
    p.textContent = 'No image on file for this print.';
    modalBody.appendChild(p);
  }
  const cap = document.createElement('div');
  cap.className = 'modal-caption';
  cap.textContent = card.set ? `${card.name} · ${card.set}` : card.name;
  modalBody.appendChild(cap);
  modal.hidden = false;
}
modal.addEventListener('click', e => { if(e.target === modal) modal.hidden = true; });
modal.querySelector('.modal-close').onclick = () => modal.hidden = true;
document.addEventListener('keydown', e => { if(e.key === 'Escape') modal.hidden = true; });

/* ---------- data + render ---------- */
let CARDS = [];
let GUIDES = {};
let TURN1_RULES = {};
let YEARS = [];
let activeYear = 'ALL';
let query = '';

function renderTurn1Box(){
  const box = document.getElementById('turn1Box');
  const data = TURN1_RULES[activeYear];
  if(activeYear === 'ALL' || !data){
    box.hidden = true;
    box.innerHTML = '';
    return;
  }
  box.hidden = false;
  const allowedLabels = data.rules.filter(r => r.allowed).map(r => r.label);
  const deniedLabels = data.rules.filter(r => !r.allowed).map(r => r.label);
  const rulesHtml = [
    allowedLabels.length ? `<div class="t1-rule">✅ ${esc(allowedLabels.join('/'))}</div>` : '',
    deniedLabels.length ? `<div class="t1-rule">❌ ${esc(deniedLabels.join('/'))}</div>` : '',
  ].join('');
  box.innerHTML = `
    <button type="button" class="t1-toggle">
      <span>📜 Turn 1 Rules — ${esc(activeYear)}</span>
      <span class="t1-arrow">▶</span>
    </button>
    <div class="t1-panel">
      <div class="t1-flip"><strong>Flip:</strong> ${esc(data.flip)}</div>
      <div class="t1-sub">Player going first:</div>
      ${rulesHtml}
    </div>`;
  const btn = box.querySelector('.t1-toggle');
  const panel = box.querySelector('.t1-panel');
  btn.onclick = () => {
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('active', isOpen);
  };
}

const SECTIONS = [['Pokemon', 'Pokémon'], ['Trainer', 'Trainers'], ['Energy', 'Energy']];

function slug(name){
  return name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
}

const esc = s => String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function hl(text, q){
  const t = esc(text);
  if(!q) return t;
  const i = t.toLowerCase().indexOf(q.toLowerCase());
  if(i < 0) return t;
  return t.slice(0,i) + '<mark>' + t.slice(i, i+q.length) + '</mark>' + t.slice(i+q.length);
}

const yearsEl = document.getElementById('years');
function chip(label, val){
  const b = document.createElement('div');
  b.className = 'chip' + (val === activeYear ? ' active' : '');
  b.textContent = label;
  b.onclick = () => { activeYear = val; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); b.classList.add('active'); renderTurn1Box(); render(); };
  return b;
}

document.getElementById('q').addEventListener('input', e => { query = e.target.value.trim(); render(); });

function matches(c, q){
  if(!q) return true;
  q = q.toLowerCase();
  return c.name.toLowerCase().includes(q)
      || c.deck.toLowerCase().includes(q)
      || String(c.set).toLowerCase().includes(q);
}

function makeRow(c, query){
  const r = document.createElement('div');
  r.className = 'row';
  r.innerHTML = `<span class="cnt">${esc(c.count)}</span>
    <span class="nm">${hl(c.name, query)}</span>
    <span class="st">${hl(c.set, query)}</span>`;
  r.onclick = () => openCardModal(c);
  return r;
}

function render(){
  let rows = CARDS;
  if(activeYear !== 'ALL') rows = rows.filter(c => c.year === activeYear);
  if(query) rows = rows.filter(c => matches(c, query));

  const groups = new Map();
  for(const c of rows){
    if(!groups.has(c.deck)) groups.set(c.deck, []);
    groups.get(c.deck).push(c);
  }

  const list = document.getElementById('list');
  const stats = document.getElementById('stats');
  list.innerHTML = '';

  if(groups.size === 0){
    list.innerHTML = '<div class="empty">No matches. Try a different search or year.</div>';
    stats.textContent = '';
    return;
  }

  let totalCards = 0;
  for(const arr of groups.values()) totalCards += arr.length;
  stats.textContent = `${groups.size} deck${groups.size>1?'s':''} · ${totalCards} card line${totalCards>1?'s':''}`;

  const collapsed = !query;

  for(const [deck, arr] of groups){
    const d = document.createElement('div');
    d.className = 'deck' + (collapsed ? ' collapsed' : '');
    const total = arr.reduce((s,c)=> s + (Number(c.count)||0), 0);
    const head = document.createElement('div');
    head.className = 'deck-head';
    head.innerHTML = `<span class="title">${hl(deck, query)}</span>
      <span class="meta"><span class="count-badge">${total} cards</span> <span class="arrow">▼</span></span>`;
    head.onclick = () => d.classList.toggle('collapsed');
    d.appendChild(head);

    const guideHtml = GUIDES[slug(deck)];
    if(guideHtml){
      const bar = document.createElement('div');
      bar.className = 'guidebar';
      const btn = document.createElement('button');
      btn.className = 'guide-btn';
      btn.type = 'button';
      btn.textContent = '📖 See Guide';
      bar.appendChild(btn);
      const panel = document.createElement('div');
      panel.className = 'guide-panel';
      panel.innerHTML = guideHtml;
      btn.onclick = (e) => {
        e.stopPropagation();
        const isOpen = panel.classList.toggle('open');
        d.classList.toggle('guide-open', isOpen);
        btn.classList.toggle('active', isOpen);
        btn.textContent = isOpen ? '✕ Close Guide' : '📖 See Guide';
      };
      d.appendChild(bar);
      d.appendChild(panel);
    }

    const cw = document.createElement('div');
    cw.className = 'cards';
    for(const [key, label] of SECTIONS){
      const sectionRows = arr.filter(c => c.category === key);
      if(sectionRows.length === 0) continue;
      const sectionTotal = sectionRows.reduce((s,c)=> s + (Number(c.count)||0), 0);
      const secHead = document.createElement('div');
      secHead.className = 'section-head';
      secHead.innerHTML = `<span>${label}</span><span class="section-total">${sectionTotal}</span>`;
      cw.appendChild(secHead);
      for(const c of sectionRows) cw.appendChild(makeRow(c, query));
    }
    d.appendChild(cw);
    list.appendChild(d);
  }
}

async function init(){
  const list = document.getElementById('list');
  try{
    const [cardsRes, guidesRes, turn1Res] = await Promise.all([
      fetch('data/cards.json'), fetch('data/guides.json'), fetch('data/turn1_rules.json')
    ]);
    CARDS = await cardsRes.json();
    GUIDES = await guidesRes.json();
    TURN1_RULES = await turn1Res.json();
  }catch(err){
    list.innerHTML = '<div class="empty">Couldn\'t load the collection data. If you opened this file directly from disk, serve it over http(s) instead (fetch() of local JSON is blocked from file://).</div>';
    return;
  }
  YEARS = [...new Set(CARDS.map(c => c.year))];
  yearsEl.appendChild(chip('All years', 'ALL'));
  YEARS.forEach(y => yearsEl.appendChild(chip(y, y)));
  render();
}
init();
</script>
</body>
</html>
